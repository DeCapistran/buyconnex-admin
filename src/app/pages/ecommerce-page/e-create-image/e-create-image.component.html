<mat-card
    class="trinta-card add-product-card mb-25 bg-white border-none d-block"
>
    <mat-card-header>
        <mat-card-title>
            <h5 class="mt-0 mb-0">
                Ajouter Image
            </h5>
        </mat-card-title>
    </mat-card-header>
    <mat-card-content>
        <form>
            <div class="row">
                <div class="col-lg-6">
                        <label class="label d-block fw-medium mb-10">
                            Nom Article
                        </label>
                        <mat-form-field>
                            <i-feather name="list"></i-feather>
                            <mat-label>Nom Article</mat-label>
                            <input type="text" matInput [formControl]="myControl" [matAutocomplete]="auto">
                            <mat-autocomplete #auto="matAutocomplete" [displayWith]="displayFn">
                                @for (option of filteredOptions | async; track option) {
                                    <mat-option [value]="option">{{option.name}}</mat-option>
                                }
                            </mat-autocomplete>
                        </mat-form-field>
                </div>
                <div class="col-lg-6">
                    <label class="label d-block fw-medium mb-10">
                        Couleur
                    </label>
                    <mat-form-field>
                        <i-feather name="at-sign"></i-feather>
                        <mat-label>Couleur</mat-label>
                        <input matInput>
                    </mat-form-field>
                </div>
                
                <div class="col-lg-12">
                    <label class="label d-block fw-medium mb-10">
                        Images Article
                    </label>
                    <file-upload class="file-uploader"></file-upload>
                </div>
            </div>
            <div class="create-product-btn">
                <button mat-button type="button">
                    Ajouter
                </button>
            </div>
        </form>
    </mat-card-content>
</mat-card>
