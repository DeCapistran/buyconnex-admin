<mat-card
    class="trinta-card add-product-card mb-25 bg-white border-none d-block"
>
    <mat-card-header>
        <mat-card-title>
            <h5 class="mt-0 mb-0">
                Ajouter Promotion
            </h5>
        </mat-card-title>
    </mat-card-header>
    <mat-card-content>
        <form>
            <div class="row">
                <div class="col-lg-6">
                    <label class="label d-block fw-medium mb-10">
                        Libéllé Promotion
                    </label>
                    <mat-form-field>
                        <i-feather name="edit-3"></i-feather>
                        <mat-label>Entrer le libéllé de la promotion</mat-label>
                        <input matInput>
                    </mat-form-field>
                </div>
                <div class="col-lg-6">
                    <label class="label d-block fw-medium mb-10">
                        Pourcentage de remise
                    </label>
                    <mat-form-field>
                        <i-feather name="database"></i-feather>
                        <mat-label>Pourcentage de remise</mat-label>
                        <input matInput>
                    </mat-form-field>
                </div>  
                <div class="col-lg-12">
                    <label class="label d-block fw-medium mb-10">
                        Article
                    </label>
                    <mat-form-field>
                        <i-feather name="list"></i-feather>
                        <mat-label>Selectionner les articles de la promotion</mat-label>
                        <mat-select [formControl]="toppings" multiple>
                            @for (topping of toppingList; track topping) {
                                <mat-option [value]="topping">{{topping}}</mat-option>
                            }
                        </mat-select>
                    </mat-form-field>
                </div>  
                <div class="col-lg-6">
                    <label class="label d-block fw-medium mb-10">
                        Date de début
                    </label>
                    <mat-form-field>
                        <i-feather name="list"></i-feather>
                        <mat-label>Date de début</mat-label>
                        <input matInput [matDatepicker]="dp1" disabled>
                        <mat-datepicker-toggle matIconSuffix [for]="dp1"></mat-datepicker-toggle>
                        <mat-datepicker #dp1 disabled="false"></mat-datepicker>
                    </mat-form-field>
                </div>
                <div class="col-lg-6">
                    <label class="label d-block fw-medium mb-10">
                        Date de fin
                    </label>
                    <mat-form-field>
                        <i-feather name="list"></i-feather>
                        <mat-label>Date de fin</mat-label>
                        <input matInput [matDatepicker]="dp2" disabled>
                        <mat-datepicker-toggle matIconSuffix [for]="dp2"></mat-datepicker-toggle>
                        <mat-datepicker #dp2 disabled="false"></mat-datepicker>
                    </mat-form-field>
                </div>
                <div class="col-lg-12">
                    <label class="label d-block fw-medium mb-10">
                        Description Promotion
                    </label>
                    <div class="NgxEditor__Wrapper">
                        <ngx-editor-menu [editor]="editor" [toolbar]="toolbar"></ngx-editor-menu>
                        <ngx-editor [editor]="editor" [ngModel]="html" name="html" [disabled]="false" [placeholder]="'Aperçu de la forme du texte...'"></ngx-editor>
                    </div>
                </div>
            </div>
            <div class="create-product-btn">
                <button mat-button type="button">
                    Ajouter
                </button>
            </div>
        </form>
    </mat-card-content>
</mat-card>
