<mat-card
    class="trinta-card add-product-card mb-25 bg-white border-none d-block"
>
    <mat-card-header>
        <mat-card-title>
            <h5 class="mt-0 mb-0">
                {{titre}}
            </h5>
        </mat-card-title>
    </mat-card-header>
    <mat-card-content>
        <div class="alert alert-danger" *ngIf="showMessage2">
            <strong>{{err}}</strong>
        </div>
        <div class="alert alert-success" *ngIf="showMessage">
            <strong>{{err}}</strong>
        </div>
        <form [formGroup]="categorieForm" (ngSubmit)="onSubmit()">
            <div class="row">
                <div class="col-lg-12">
                    <label class="label d-block fw-medium mb-10">
                        Nom catégorie
                    </label>
                    <mat-form-field>
                        <i-feather name="edit-3"></i-feather>
                        <mat-label>Entrer le nom de la catégorie</mat-label>
                        <input id="libelle" type="text" formControlName="libelle" matInput [(ngModel)]="categorie.libelle">
                        <div *ngIf="categorieForm.get('libelle')?.touched && categorieForm.get('libelle')?.invalid" class="error-message">
                            <small *ngIf="categorieForm.get('libelle')?.errors?.['required']">Libelle Obligatoire.</small>
                            <small *ngIf="categorieForm.get('libelle')?.errors?.['pattern']">Libelle Invalide.</small>
                        </div>
                    </mat-form-field>
                </div>
                <div class="col-lg-12">
                    <label class="label d-block fw-medium mb-10">
                        Images Catégorie
                    </label>
                    <div *ngIf="imagePath" class="mb-3">
                        <img [src]="imagePath" alt="Image de la categorie" style="max-width: 20px;">
                    </div>
                    <input id="img" type="file" formControlName="img" (change)="onImageUpload($event)" class="form-control" >
                    <div *ngIf="categorieForm.get('img')?.touched && categorieForm.get('img')?.invalid" class="error-message">
                        <small *ngIf="categorieForm.get('img')?.errors?.['required']">Image Obligatoire.</small>
                    </div>
                </div>
            </div>
            <div class="create-product-btn">
                <button mat-button type="button" class="btn-cancel" (click)="annuler()">
                    Annuler
                </button>

                <button mat-button type="submit" class="btn-submit">
                    {{ bouton }}
                </button>
            </div>
        </form>
    </mat-card-content>
</mat-card>
