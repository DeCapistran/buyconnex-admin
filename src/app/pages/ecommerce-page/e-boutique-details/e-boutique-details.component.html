<mat-card
    class="trinta-card leads-report-card mb-25 bg-white border-none d-block"
>
    <mat-card-header>
        <mat-card-title>
            <h5 class="mt-0 mb-0">
                Boutiques
            </h5>
        </mat-card-title>       
    <mat-card-subtitle>
        <a routerLink="/ecommerce-page/create-boutique" class="default-btn" mat-button>
            <i class="ri-add-line"></i> Ajouter
        </a>
    </mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
        <div class="alert alert-danger" *ngIf="showMessage2">
            <strong>{{err}}</strong>
        </div>
        <div class="alert alert-success" *ngIf="showMessage">
            <strong>{{err}}</strong>
        </div>
        <div class="leads-report-table">
            <div class="table-responsive">
                <table mat-table [dataSource]="dataSource" matSort>

                    <!-- Tracking No Column -->
                    <ng-container matColumnDef="id">
                        <th mat-header-cell *matHeaderCellDef class="text-primary pl-0">
                            No
                        </th>
                        <td mat-cell *matCellDef="let element; let i = index" class="text-primary fw-medium pl-0">
                            {{(paginator.pageIndex * paginator.pageSize) + i + 1}}
                        </td>
                    </ng-container>

                    <ng-container matColumnDef="images">
                        <th mat-header-cell *matHeaderCellDef>
                            Image
                        </th>
                        <td mat-cell *matCellDef="let element">
                            <div class="image d-block">
                                <img [src]="element.images.url" alt="boutique-image" style="width: 40px; height: 40px; object-fit: cover;">
                            </div>
                        </td>
                    </ng-container>

                    <!-- Product Column -->
                    <ng-container matColumnDef="nom">
                        <th mat-header-cell *matHeaderCellDef mat-sort-header>
                            Boutique
                        </th>
                        <td mat-cell *matCellDef="let element">
                            <div class="product-info d-flex align-items-center">
                                <div class="info">
                                    <div class="d-block">
                                        {{element.nom}}
                                    </div>
                                </div>
                            </div>
                        </td>
                    </ng-container>

                    <!-- Customer Column -->
                    <ng-container matColumnDef="email">
                        <th mat-header-cell *matHeaderCellDef>
                            Email
                        </th>
                        <td mat-cell *matCellDef="let element">
                            {{element.email}}
                        </td>
                    </ng-container>

                    <!-- Quantity Column -->
                    <ng-container matColumnDef="contact">
                        <th mat-header-cell *matHeaderCellDef>
                            Contact
                        </th>
                        <td mat-cell *matCellDef="let element">
                            {{element.contact}}
                        </td>
                    </ng-container>

                    <!-- Action Column -->
                    <ng-container matColumnDef="actions">
                        <th mat-header-cell *matHeaderCellDef class="text-end pr-0">
                            Actions
                        </th>
                        <td mat-cell *matCellDef="let element" class="text-end pr-0">
                            <div class="action">
                                <button type="button" [routerLink]="['/ecommerce-page/create-boutique', element.id]" mat-button class="p-0 min-w-auto lh-1 h-auto">
                                    <i class="{{element.actions.edit}}"></i>
                                </button>
                                <button type="button" mat-button class="p-0 min-w-auto lh-1 h-auto" (click)="openDeleteDialog(element)">
                                    <i class="{{element.actions.delete}}"></i>
                                </button>
                            </div>
                        </td>
                    </ng-container>

                    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

                </table>
            </div>
            <mat-paginator [pageSizeOptions]="[10, 20, 30]"></mat-paginator>
        </div>
    </mat-card-content>
</mat-card>
