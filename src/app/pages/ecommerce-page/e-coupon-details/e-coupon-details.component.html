<mat-card
    class="trinta-card leads-report-card mb-25 bg-white border-none d-block"
>
    <mat-card-header>
        <mat-card-title>
            <h5 class="mt-0 mb-0">
                Coupons
            </h5>
        </mat-card-title>     
    <mat-card-subtitle>
        <a routerLink="/ecommerce-page/create-coupon" class="default-btn" mat-button>
            <i class="ri-add-line"></i> Ajouter
        </a>
    </mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
        <div class="leads-report-table">
            <div class="table-responsive">
                <table mat-table [dataSource]="dataSource">

                    <!-- Tracking No Column -->
                    <ng-container matColumnDef="trackingID">
                        <th mat-header-cell *matHeaderCellDef class="text-primary pl-0">
                            No
                        </th>
                        <td mat-cell *matCellDef="let element" class="text-primary fw-medium pl-0">
                            {{element.trackingID}}
                        </td>
                    </ng-container>

                    <!-- Product Column -->
                    <ng-container matColumnDef="product">
                        <th mat-header-cell *matHeaderCellDef>
                            Boutique
                        </th>
                        <td mat-cell *matCellDef="let element">
                            <div class="product-info d-flex align-items-center">
                                <div class="image d-block">
                                    <img [src]="element.product.img" alt="product-image">
                                </div>
                                <div class="info">
                                    <div class="d-block fw-semibold">
                                        {{element.product.title}}
                                    </div>
                                </div>
                            </div>
                        </td>
                    </ng-container>

                    <!-- Customer Column -->
                    <ng-container matColumnDef="customer">
                        <th mat-header-cell *matHeaderCellDef>
                            Email
                        </th>
                        <td mat-cell *matCellDef="let element">
                            {{element.customer}}
                        </td>
                    </ng-container>

                    <!-- Quantity Column -->
                    <ng-container matColumnDef="quantity">
                        <th mat-header-cell *matHeaderCellDef>
                            Contact
                        </th>
                        <td mat-cell *matCellDef="let element">
                            {{element.quantity}}
                        </td>
                    </ng-container>

                    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

                </table>
            </div>
            <mat-paginator [pageSizeOptions]="[10, 20, 30]"></mat-paginator>
        </div>
    </mat-card-content>
</mat-card>
