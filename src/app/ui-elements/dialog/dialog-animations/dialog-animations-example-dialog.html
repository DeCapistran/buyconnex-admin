<h1 mat-dialog-title class="title-dialog">
    Suppression
</h1>
<div mat-dialog-content class="dialog-actions-center">
    <p>
        Voulez-vous supprimer <span class="name-highlight">{{ data.name }}</span> ?
    </p>
</div>
<div mat-dialog-actions class="dialog-actions-center">
    <button mat-flat-button color="warn" (click)="onNoClick()">Non</button>
    <button mat-flat-button color="primary" (click)="onYesClick()" cdkFocusInitial>Oui</button>
</div>
