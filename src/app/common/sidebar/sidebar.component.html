<div class="sidebar-area bg-white transition" [ngClass]="{'active': isToggled}">
    <div class="logo bg-white">
        <a routerLink="/" class="d-flex align-items-center">
            <img src="assets/images/logo-icon.svg" alt="logo-icon">
            <span class="fw-extrabold">
                Buyconnex
            </span>
        </a>
    </div>
    <div class="burger-menu transition cursor-pointer" [ngClass]="{'active': isToggled}" (click)="toggle()">
        <span class="top-bar transition bg-dark d-block"></span>
        <span class="middle-bar transition bg-dark d-block"></span>
        <span class="bottom-bar transition bg-dark d-block"></span>
    </div>
    <ng-scrollbar visibility="hover">
        <div class="sidebar-inner">
            <div class="sidebar-menu">
                <mat-accordion>
                    <mat-panel-title>
                        <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}"
                            class="sidebar-menu-link">
                            <i-feather name="activity"></i-feather>
                            <span class="title">
                                Dashboard
                            </span>
                        </a>
                    </mat-panel-title>
                    <mat-panel-title>
                        <a routerLink="/ecommerce-page/products-list" routerLinkActive="active"
                            [routerLinkActiveOptions]="{exact: true}" class="sidebar-menu-link">
                            <i-feather name="shopping-bag"></i-feather>
                            <span class="title">
                                Mes Articles
                            </span>
                        </a>
                    </mat-panel-title>
                    <mat-panel-title>
                        <a routerLink="/ecommerce-page/categorie-details" routerLinkActive="active"
                            [routerLinkActiveOptions]="{exact: true}" class="sidebar-menu-link">
                            <i-feather name="layers"></i-feather>
                            <span class="title">
                                Mes Catégories
                            </span>
                        </a>
                    </mat-panel-title>
                    <mat-panel-title>
                        <a routerLink="/ecommerce-page/orders-list" routerLinkActive="active"
                            [routerLinkActiveOptions]="{exact: true}" class="sidebar-menu-link">
                            <i-feather name="shopping-cart"></i-feather>
                            <span class="title">
                                Mes Commandes
                            </span>
                        </a>
                    </mat-panel-title>
                    <mat-panel-title>
                        <a routerLink="/ecommerce-page/customers-list" routerLinkActive="active"
                            [routerLinkActiveOptions]="{exact: true}" class="sidebar-menu-link">
                            <i-feather name="users"></i-feather>
                            <span class="title">
                                Mes Clients
                            </span>
                        </a>
                    </mat-panel-title>
                    <mat-panel-title>
                        <a routerLink="/ecommerce-page/boutique-details" routerLinkActive="active"
                            [routerLinkActiveOptions]="{exact: true}" class="sidebar-menu-link">
                            <i-feather name="home"></i-feather>
                            <span class="title">
                                Mes Boutiques
                            </span>
                        </a>
                    </mat-panel-title>
                    <mat-panel-title>
                        <a routerLink="/ecommerce-page/create-image" routerLinkActive="active"
                            [routerLinkActiveOptions]="{exact: true}" class="sidebar-menu-link">
                            <i-feather name="camera"></i-feather>
                            <span class="title">
                                Mes Images
                            </span>
                        </a>
                    </mat-panel-title>
                    <mat-panel-title>
                        <a routerLink="/ecommerce-page/coupon-details" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}"
                            class="sidebar-menu-link">
                            <i-feather name="tag"></i-feather>
                            <span class="title">
                                Mes Coupons
                            </span>
                        </a>
                    </mat-panel-title>
                    <mat-panel-title>
                        <a routerLink="/ecommerce-page/promotion-list" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}"
                            class="sidebar-menu-link">
                            <i-feather name="trending-up"></i-feather>
                            <span class="title">
                                Mes Promotions
                            </span>
                        </a>
                    </mat-panel-title>

                    <mat-panel-title>
                        <a routerLink="/invoices" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}"
                            class="sidebar-menu-link">
                            <i-feather name="file-text"></i-feather>
                            <span class="title">
                                Mes Factures
                            </span>
                        </a>
                    </mat-panel-title>
                    <mat-panel-title>
                        <a routerLink="/settings" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}"
                            class="sidebar-menu-link">
                            <i-feather name="settings"></i-feather>
                            <span class="title">
                                Paramètres
                            </span>
                        </a>
                    </mat-panel-title>
                    <a routerLink="/authentication/logout" class="sidebar-menu-link" routerLinkActive="active"
                        [routerLinkActiveOptions]="{exact: true}">
                        <i-feather name="home"></i-feather>
                        <span class="title">Déconnexion</span>
                    </a>
                </mat-accordion>
            </div>
        </div>
    </ng-scrollbar>
</div>
